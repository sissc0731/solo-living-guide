const fs=require('fs'),path=require('path'),today=new Date().toISOString().slice(0,10),slug=today;
const feed=JSON.parse(fs.readFileSync(path.join(__dirname,'..','feed.json'),'utf8'));
if(feed.posts.find(p=>p.slug===slug)){console.log('Exists');process.exit(0)}
const articles=[
{title:'一个人住可以有多爽？独居生活的7个幸福法则',tag:'独居生活',intro:'独居不孤独，独居是自由。一个人的日子可以过得比想象中更精彩——前提是掌握让独居幸福的几个法则。',sections:[{title:'🏠 把你的家变成最舒服的地方',body:'独居最大的好处是：所有空间都是你的。不用妥协，不用将就。把喜欢的颜色涂在墙上、种满阳台的植物、在客厅搭一个投影角落、买一张超大书桌。一个人住，家不是睡觉的地方，是充电站。每天回到家推开门的那一刻，应该让你发自内心地觉得舒服。'},{title:'📅 建立自己的生活节律',body:'独居最容易陷入的陷阱是：没有约束，作息混乱。给自己定几个小仪式：每天早上冲一杯手冲咖啡、每天傍晚出门散步30分钟、每周五晚上给自己做一顿大餐。这些小仪式是生活的锚点，让你在自由中保持秩序。'},{title:'🤝 主动经营社交但不要被动社交',body:'一个人住不代表与世隔绝。主动约朋友吃饭、加入兴趣社群（读书会/徒步群/配音课）、养一只宠物（独居者的最佳室友）。社交的质量远比数量重要——一个聊得来的朋友胜过一百个泛泛之交。'}]},
{title:'独居久了会孤独吗？如何和自己的情绪和平相处',tag:'情绪管理',intro:'独居怕的不是一个人吃饭一个人睡觉，怕的是情绪上来的时候没人在身边。学会和自己的情绪做朋友，是独居者最重要的技能。',sections:[{title:'🧘 孤独和寂寞的区别',body:'孤独是物理状态——你身边没有人。寂寞是心理状态——你觉得没有连接。独居感到的往往是寂寞而非孤独。解决寂寞的方式不是找个人来陪，而是找到让你觉得有意义、有连接感的事：写日记、做志愿者、养植物、加入线上社群。当你沉浸在热爱的事情里时，寂寞自然消退。'},{title:'📝 情绪日记的力量',body:'独居时情绪容易被放大——因为没有别的声音来冲淡它。写情绪日记是最简单有效的自我疗愈：当感到焦虑/低落时，花5分钟写下\"我正在感受到____\"\"这种感觉来自____\"\"我现在可以为我自己做____\"。写下来的瞬间，情绪就减轻了一半。不是道理，是真实有效的心理技巧。'},{title:'🚨 需要求助的信号',body:'如果连续两周以上：对任何事提不起兴趣、食欲和睡眠严重紊乱、不想见任何人不想出门、甚至出现伤害自己的念头——这不是\"矫情\"，是需要专业帮助的信号。打心理援助热线或预约咨询师，和感冒了需要看医生一样正常。独居者更要学会及时求助。'}]},
{title:'一个人吃饭怎么做？独居者的高效备菜和快手菜',tag:'一人食',intro:'一个人做饭最尴尬的是：做一个菜太少，做两个吃不完。其实独居做饭有独居的聪明做法——高效省时、不浪费、还能吃得好。',sections:[{title:'🛒 一次买够一周的菜',body:'周末花1小时备菜，工作日每天10分钟就能吃上饭。肉类分装好冷冻（每份一人量）、蔬菜洗好切好冷藏、米饭煮一锅分装冷冻（吃的时候微波3分钟）。备好的菜不要超过3天，绿叶菜最后两天吃。不会浪费的秘诀：只买计划内的，不冲动买菜。'},{title:'🍳 独居者的万能菜式',body:'炒饭：剩饭+鸡蛋+冰箱里随机的蔬菜=5分钟搞定。一锅炖：肉+蔬菜+米饭放电饭煲=不用管自动熟。拌面：煮面+任何蔬菜+酱料=3分钟。水煮菜+蘸料：任何菜水煮+灵魂蘸料（蒜末醋生抽辣椒油）=零翻车率。这些菜的共同特点：一个锅搞定、洗的东西少、不会失败。'},{title:'🥡 偶尔点外卖不罪恶',body:'独居者点外卖不用觉得懒。时间也是成本，有时候用做饭的时间去读书运动更值。选外卖的时候：优先选有堂食的店（比纯外卖店干净）、加一份蔬菜（不要全是主食和肉）、酱料分开放（减少钠和油）。一个人点外卖不要凑满减——多点的最终都浪费了。'}]},
{title:'单身怎么规划财务？一个人的存钱和保险指南',tag:'财务规划',intro:'一个人生活，钱是最大的安全感。没有另一半可以临时依靠，你的财务规划要比有家庭的人更稳健。但这不代表要过苦日子——聪明的规划让你既享受当下又不焦虑未来。',sections:[{title:'💰 存钱的黄金比例',body:'50-30-20法则：50%收入用于必需开销（房租吃饭交通）、30%用于享受生活（旅行爱好社交）、20%存起来。独居者需要更大的应急储备——6个月生活费（有家庭的是3个月）。因为你没有第二份收入可以兜底。这笔钱放在活期或短期理财，随时可取。'},{title:'🛡 一个人的保险配置',body:'医疗险（百万医疗就够了，一年几百块，大病花销能全报）、重疾险（确诊大病直接给一笔钱，覆盖治疗期间不能工作的损失）、意外险（一年一百多块，意外受伤住院都能报销）。寿险不需要买——寿险是留给家人的，一个人不需要。买保险前先做体检，别买了才发现有问题不赔。'},{title:'🏖 长期规划',body:'养老钱越早开始越好。每月定投指数基金（沪深300或标普500 ETF），复利效应会让你退休时有足够底气。不要全部存银行定期——跑不赢通胀。单身最大的财务优势是花销可控，利用这个优势为自己的未来投资。'}]},
];
const idx=(new Date().getDate()-1)%articles.length,a=articles[idx];
feed.posts.unshift({slug,date:today,title:a.title,tag:a.tag,intro:a.intro,sections:a.sections});
feed.updated=today;fs.writeFileSync(path.join(__dirname,'..','feed.json'),JSON.stringify(feed,null,2));
const html=`<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>${a.title}</title><meta name="description" content="${a.intro}"><style>*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}:root{--bg:#fafafa;--card:#fff;--text:#1a1a2e;--t2:#555;--accent:#6366f1;--border:#e5e7eb;--r:12px}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC",sans-serif;background:var(--bg);color:var(--text);line-height:1.9;font-size:16px}.container{max-width:750px;margin:0 auto;padding:0 20px}header{background:linear-gradient(135deg,#6366f1,#818cf8);color:#fff;padding:36px 0;margin-bottom:24px}header a{color:rgba(255,255,255,.85);text-decoration:none;font-size:.9rem}header h1{font-size:1.5rem;margin-top:8px;line-height:1.4}.post{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:32px}.post .intro{font-size:1rem;color:var(--t2);margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--border);line-height:1.8}.section{margin-bottom:24px}.section h3{font-size:1.05rem;margin-bottom:6px;color:var(--accent)}.section p{color:var(--t2);font-size:.92rem;line-height:1.9}footer{text-align:center;padding:24px;color:#999;font-size:.75rem}@media(max-width:600px){.post{padding:18px}}</style></head><body><header><div class="container"><a href="../index.html">← 首页</a><h1>${a.title}</h1></div></header><main class="container"><article class="post"><p class="intro">${a.intro}</p>${a.sections.map(s=>`<div class="section"><h3>${s.title}</h3><p>${s.body}</p></div>`).join('')}</article></main><footer><p>🏠 独居生活指南 · 每日更新</p></footer></body></html>`;
fs.writeFileSync(path.join(__dirname,'..','posts',slug+'.html'),html);
console.log('OK');
